<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico de Negócio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- LOGO / HEADER -->
  <div class="header">
    <h1>📊 Diagnóstico Inteligente</h1>
    <p>Descubra por que seu negócio não cresce</p>
  </div>

  <!-- BARRA DE PROGRESSO -->
  <div class="progress">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <h2 id="question"></h2>
    <div id="options"></div>
  </div>

  <!-- RESULTADO -->
  <div id="result" class="hidden">
    <h2 id="result-title"></h2>
    <p id="result-text"></p>
    <div id="cta"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
